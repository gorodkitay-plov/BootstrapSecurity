<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Page</title>
</head>
<body>

<h2>User Info</h2>

<table border="1">
    <tr><th>ID</th><td th:text="${user.id}"></td></tr>
    <tr><th>Username</th><td th:text="${user.username}"></td></tr>
    <tr><th>Name</th><td th:text="${user.name}"></td></tr>
    <tr><th>Surname</th><td th:text="${user.surname}"></td></tr>
    <tr><th>Email</th><td th:text="${user.email}"></td></tr>
    <tr><th>Age</th><td th:text="${user.age}"></td></tr>
    <tr>
        <th>Roles</th>
        <td>
            <span th:each="role : ${user.roles}" th:text="${role.name} + ' '"></span>
        </td>
    </tr>
</table>

<br/>

<form th:action="@{/logout}" method="post">
    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}"/>
    <button type="submit">Logout</button>
</form>

</body>
</html>
