<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>User Page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- TOP NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3 d-flex justify-content-between">

    <!-- ЛЕВАЯ ЧАСТЬ -->
    <span class="navbar-text text-white">
        <b sec:authentication="name"></b>
        with roles
        <span sec:authentication="authorities"></span>
    </span>

    <!-- ПРАВАЯ ЧАСТЬ -->
    <form th:action="@{/logout}" method="post" class="m-0">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <button class="btn btn-link text-white p-0">Logout</button>
    </form>

</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 bg-white border-end vh-100 pt-3">
            <ul class="nav flex-column">

                <!-- ADMIN видит -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}">
                        Admin
                    </a>
                </li>

                <!-- USER видит -->
                <li class="nav-item">
                    <a class="nav-link active bg-primary text-white" th:href="@{/user}">
                        User
                    </a>
                </li>

            </ul>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-10 p-4">

            <h2>User information-page</h2>

            <div class="card">
                <div class="card-header">
                    About user
                </div>

                <div class="card-body">

                    <table class="table table-striped">
                        <tr>
                            <th>ID</th>
                            <td th:text="${user.id}"></td>
                        </tr>
                        <tr>
                            <th>Username</th>
                            <td th:text="${user.username}"></td>
                        </tr>
                        <tr>
                            <th>Name</th>
                            <td th:text="${user.name}"></td>
                        </tr>
                        <tr>
                            <th>Surname</th>
                            <td th:text="${user.surname}"></td>
                        </tr>
                        <tr>
                            <th>Email</th>
                            <td th:text="${user.email}"></td>
                        </tr>
                        <tr>
                            <th>Age</th>
                            <td th:text="${user.age}"></td>
                        </tr>
                        <tr>
                            <th>Roles</th>
                            <td>
                                <span th:each="role : ${user.roles}"
                                      th:text="${role.name} + ' '"></span>
                            </td>
                        </tr>
                    </table>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
