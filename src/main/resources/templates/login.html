<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-sm" style="width: 400px;">
    <div class="card-body">
      <h3 class="card-title text-center mb-4">Please sign in</h3>

      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
          <label class="form-label text-center d-block fw-bold">Username</label>
          <input type="text" class="form-control w-75 mx-auto" name="username" placeholder="Enter username" required>
        </div>

        <div class="mb-3">
          <label class="form-label text-center d-block fw-bold">Password</label>
          <input type="password" class="form-control w-75 mx-auto" name="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn btn-primary w-50 mx-auto d-block">Login</button>
      </form>
      <div class="mt-3 text-center text-muted">
        © 2026 Bulochka Company
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
