<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
</head>
<body>
<h2>Edit User</h2>
<form th:action="@{/admin/{id}(id=${user.id})}" th:object="${user}" method="post">
    <input type="hidden" name="_method" value="patch"/>
    <label>Username: <input type="text" th:field="*{username}"/></label><br/>
    <label>Password: <input type="password" th:field="*{password}" placeholder="Leave empty to keep"/></label><br/>
    <label>Name: <input type="text" th:field="*{name}"/></label><br/>
    <label>Surname: <input type="text" th:field="*{surname}"/></label><br/>
    <label>Email: <input type="email" th:field="*{email}"/></label><br/>
    <label>Age: <input type="number" th:field="*{age}"/></label><br/>

    <h4>Roles</h4>
    <div th:each="role : ${rolesList}">
        <label>
            <input type="checkbox" name="rolesSelected"
                   th:value="${role.name}"
                   th:checked="${user.roles.contains(role)}"/>
            <span th:text="${role.name}"></span>
        </label><br/>
    </div>

    <button type="submit">Update</button>
</form>
<a th:href="@{/admin}">Back</a>
</body>
</html>
