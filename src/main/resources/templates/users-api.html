<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Users API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .navbar-custom { background: #1a1a2e; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
        .navbar-brand { font-size: 15px; font-weight: 500; color: #fff; }
        .navbar-user { font-size: 13px; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 12px; }
        .layout { display: flex; min-height: calc(100vh - 46px); }
        .sidebar { width: 200px; background: #fff; border-right: 1px solid #e9ecef; padding: 1rem 0; flex-shrink: 0; }
        .sidebar-link { display: block; padding: 10px 20px; font-size: 14px; color: #6c757d; text-decoration: none; border-left: 3px solid transparent; }
        .sidebar-link:hover { background: #f8f9fa; color: #212529; }
        .sidebar-link.active { color: #070d11; border-left-color: #0b1015; background: #e6f1fb; font-weight: 500; }
        .main { flex: 1; padding: 2rem; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
        .page-header h2 { font-size: 20px; font-weight: 500; margin: 0; }
        .badge-count { background: #e6f1fb; color: #185FA5; font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
        .tabs { display: flex; border-bottom: 1px solid #dee2e6; margin-bottom: 1.5rem; }
        .tab-btn { padding: 10px 20px; font-size: 14px; color: #6c757d; cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; }
        .tab-btn.active { color: #185FA5; border-bottom-color: #185FA5; font-weight: 500; }
        .tab-btn:hover { color: #212529; }
        .card { background: #fff; border: 1px solid #e9ecef; border-radius: 12px; overflow: hidden; }
        .card-header { padding: 12px 16px; border-bottom: 1px solid #e9ecef; font-size: 13px; font-weight: 500; color: #6c757d; display: flex; align-items: center; justify-content: space-between; background: #fff; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th { padding: 10px 14px; text-align: left; color: #6c757d; font-weight: 500; background: #f8f9fa; border-bottom: 1px solid #e9ecef; }
        tbody tr { border-bottom: 1px solid #f0f0f0; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f8f9fa; }
        tbody td { padding: 10px 14px; color: #212529; vertical-align: middle; }
        .role-pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #e1f5ee; color: #0f6e56; font-weight: 500; margin: 1px; }
        .role-pill.admin { background: #eeedfe; color: #534ab7; }
        .btn-edit { background: #e6f1fb; color: #185FA5; border: 1px solid #b5d4f4; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
        .btn-edit:hover { background: #b5d4f4; }
        .btn-del { background: #fcebeb; color: #a32d2d; border: 1px solid #f7c1c1; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
        .btn-del:hover { background: #f7c1c1; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { font-size: 12px; color: #6c757d; font-weight: 500; }
        .form-group input { padding: 8px 10px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 13px; outline: none; }
        .form-group input:focus { border-color: #378add; box-shadow: 0 0 0 3px #e6f1fb; }
        .form-actions { padding: 16px 20px; border-top: 1px solid #e9ecef; display: flex; gap: 10px; justify-content: flex-end; }
        .btn-cancel { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 8px 18px; font-size: 13px; cursor: pointer; color: #495057; }
        .btn-cancel:hover { background: #f8f9fa; }
        .btn-submit { background: #185FA5; color: #fff; border: none; border-radius: 8px; padding: 8px 20px; font-size: 13px; cursor: pointer; font-weight: 500; }
        .btn-submit:hover { background: #0c447c; }
        .section { display: none; }
        .section.active { display: block; }
        .err { font-size: 11px; color: #150909; display: none; margin-top: 2px; }
        .roles-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 4px; }
        .role-check { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
        .search-input { padding: 6px 10px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 13px; outline: none; width: 200px; }
        .search-input:focus { border-color: #378add; }
        .id-cell { color: #adb5bd; }
        .empty-row { text-align: center; padding: 40px; color: #adb5bd; font-size: 14px; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: #fff; border-radius: 12px; width: 520px; max-width: 95vw; border: 1px solid #e9ecef; }
        .modal-header { padding: 14px 18px; border-bottom: 1px solid #e9ecef; display: flex; justify-content: space-between; align-items: center; }
        .modal-header span { font-size: 15px; font-weight: 500; }
        .toast { position: fixed; bottom: 24px; right: 24px; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
        .toast.success { background: #eaf3de; color: #3b6d11; border: 1px solid #c0dd97; }
        .toast.error { background: #fcebeb; color: #a32d2d; border: 1px solid #f7c1c1; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<nav class="navbar-custom">
    <span class="navbar-brand">Spring Admin</span>
    <div class="navbar-user">
        <span><b sec:authentication="name"></b> [<span sec:authentication="authorities"></span>]</span>
        <form th:action="@{/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button style="background:transparent;border:1px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.8);border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;">Logout</button>
        </form>
    </div>
</nav>

<div class="layout">
    <div class="sidebar">
        <a class="sidebar-link" th:href="@{/admin}">Admin</a>
        <a class="sidebar-link" th:href="@{/user}">User</a>
        <a class="sidebar-link active" th:href="@{/admin/usersapi}">Users API</a>
    </div>

    <div class="main">
        <div class="page-header">
            <h2>Users API</h2>
            <span class="badge-count" id="userCount">0 users</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('list')">All users</button>
            <button class="tab-btn" onclick="showTab('add')">Add new user</button>
        </div>

        <!-- TABLE -->
        <div class="section active" id="section-list">
            <div class="card">
                <div class="card-header">
                    <span>Users</span>
                    <input class="search-input" id="searchInput" placeholder="Search by username..." oninput="filterUsers()">
                </div>
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Name</th>
                        <th>Surname</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th>Roles</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                    </thead>
                    <tbody id="usersBody">
                    <tr><td colspan="9" class="empty-row">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ADD FORM -->
        <div class="section" id="section-add">
            <div class="card">
                <div class="card-header"><span>New user</span></div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="newUsername" placeholder="e.g. johndoe">
                        <span class="err" id="e-username"></span>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="newPassword" placeholder="min. 4 characters">
                        <span class="err" id="e-password"></span>
                    </div>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="newName" placeholder="First name">
                        <span class="err" id="e-name"></span>
                    </div>
                    <div class="form-group">
                        <label>Surname</label>
                        <input type="text" id="newSurname" placeholder="Last name">
                        <span class="err" id="e-surname"></span>
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="newAge" placeholder="25" min="1" max="120">
                        <span class="err" id="e-age"></span>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="newEmail" placeholder="user@example.com">
                        <span class="err" id="e-email"></span>
                    </div>
                    <div class="form-group full">
                        <label>Roles</label>
                        <div class="roles-row">
                            <div th:each="role : ${rolesList}">
                                <label class="role-check">
                                    <input type="checkbox" class="newRole" th:value="${role.name}">
                                    <span th:text="${role.name}"></span>
                                </label>
                            </div>
                        </div>
                        <span class="err" id="e-roles"></span>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn-cancel" onclick="showTab('list')">Cancel</button>
                    <button class="btn-submit" onclick="createUser()">Create user</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <div class="modal-header">
            <span>Edit user</span>
            <button class="btn-cancel" onclick="closeModal()">Close</button>
        </div>
        <div class="form-grid">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="editUsername">
                <span class="err" id="ee-username"></span>
            </div>
            <div class="form-group">
                <label>Password <span style="font-size:11px;color:#adb5bd">(blank = keep)</span></label>
                <input type="password" id="editPassword" placeholder="Leave blank to keep">
                <span class="err" id="ee-password"></span>
            </div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="editName">
                <span class="err" id="ee-name"></span>
            </div>
            <div class="form-group">
                <label>Surname</label>
                <input type="text" id="editSurname">
                <span class="err" id="ee-surname"></span>
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="editAge">
                <span class="err" id="ee-age"></span>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail">
                <span class="err" id="ee-email"></span>
            </div>
            <div class="form-group full">
                <label>Roles</label>
                <div class="roles-row">
                    <div th:each="role : ${rolesList}">
                        <label class="role-check">
                            <input type="checkbox" class="editRole" th:value="${role.name}">
                            <span th:text="${role.name}"></span>
                        </label>
                    </div>
                </div>
                <span class="err" id="ee-roles"></span>
            </div>
        </div>
        <div class="form-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-submit" onclick="saveEdit()">Save changes</button>
        </div>
        <input type="hidden" id="csrfToken" th:value="${_csrf.token}"/>
        <input type="hidden" id="csrfHeader" th:value="${_csrf.headerName}"/>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let allUsers = [];
    const csrf  = () => document.getElementById('csrfToken').value;
    const csrfH = () => document.getElementById('csrfHeader').value;

    function showTab(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.getElementById('section-' + name).classList.add('active');
        document.querySelectorAll('.tab-btn')[name === 'list' ? 0 : 1].classList.add('active');
    }

    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = 'toast ' + type + ' show';
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function renderRoles(roles) {
        return roles.map(r => {
            const isAdmin = r.name.includes('ADMIN');
            return `<span class="role-pill ${isAdmin ? 'admin' : ''}">${r.name.replace('ROLE_', '')}</span>`;
        }).join('');
    }

    function renderTable(users) {
        const tbody = document.getElementById('usersBody');
        if (!users.length) {
            tbody.innerHTML = '<tr><td colspan="9" class="empty-row">No users found</td></tr>';
            return;
        }
        tbody.innerHTML = users.map(u => `
            <tr>
                <td class="id-cell">${u.id}</td>
                <td style="font-weight:500">${u.username}</td>
                <td>${u.name}</td>
                <td>${u.surname}</td>
                <td>${u.age}</td>
                <td style="color:#6c757d">${u.email}</td>
                <td>${renderRoles(u.roles)}</td>
                <td><button class="btn-edit" onclick='openEdit(${JSON.stringify(u)})'>Edit</button></td>
                <td><button class="btn-del" onclick="deleteUser(${u.id}, '${u.username}')">Delete</button></td>
            </tr>`).join('');
    }

    function filterUsers() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        renderTable(allUsers.filter(u => u.username.toLowerCase().includes(q)));
    }

    function loadUsers() {
        fetch('/api/users')
            .then(r => r.json())
            .then(users => {
                allUsers = users;
                document.getElementById('userCount').textContent = users.length + ' users';
                renderTable(users);
            })
            .catch(() => showToast('Failed to load users', 'error'));
    }

    function clearErrors(prefix) {
        document.querySelectorAll('[id^="' + prefix + '"]').forEach(el => {
            el.style.display = 'none'; el.textContent = '';
        });
    }

    function showErrors(errors, prefix) {
        for (const f in errors) {
            const el = document.getElementById(prefix + f);
            if (el) { el.textContent = errors[f]; el.style.display = 'block'; }
        }
    }

    function createUser() {
        clearErrors('e-');
        const roles = Array.from(document.querySelectorAll('.newRole:checked')).map(c => c.value);
        const data = {
            username: document.getElementById('newUsername').value,
            password: document.getElementById('newPassword').value,
            name:     document.getElementById('newName').value,
            surname:  document.getElementById('newSurname').value,
            age:      parseInt(document.getElementById('newAge').value),
            email:    document.getElementById('newEmail').value,
            roles:    roles
        };
        fetch('/api/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', [csrfH()]: csrf() },
            body: JSON.stringify(data)
        })
            .then(r => r.json())
            .then(res => {
                if (res.username) {
                    showToast('User created!', 'success');
                    document.querySelectorAll('#section-add input[type!=checkbox]').forEach(i => i.value = '');
                    document.querySelectorAll('.newRole').forEach(c => c.checked = false);
                    loadUsers(); showTab('list');
                } else { showErrors(res, 'e-'); }
            })
            .catch(() => showToast('Connection error', 'error'));
    }

    function openEdit(u) {
        document.getElementById('editId').value       = u.id;
        document.getElementById('editUsername').value = u.username;
        document.getElementById('editName').value     = u.name;
        document.getElementById('editSurname').value  = u.surname;
        document.getElementById('editAge').value      = u.age;
        document.getElementById('editEmail').value    = u.email;
        document.getElementById('editPassword').value = '';
        const userRoles = u.roles.map(r => r.name);
        document.querySelectorAll('.editRole').forEach(cb => cb.checked = userRoles.includes(cb.value));
        clearErrors('ee-');
        document.getElementById('editModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('editModal').classList.remove('show');
    }

    function saveEdit() {
        clearErrors('ee-');
        const id       = document.getElementById('editId').value;
        const password = document.getElementById('editPassword').value;
        const roles    = Array.from(document.querySelectorAll('.editRole:checked')).map(c => c.value);
        const data = {
            username: document.getElementById('editUsername').value,
            email:    document.getElementById('editEmail').value,
            name:     document.getElementById('editName').value,
            surname:  document.getElementById('editSurname').value,
            age:      parseInt(document.getElementById('editAge').value),
            roles:    roles
        };
        if (password && password.trim()) data.password = password;
        fetch('/api/users/' + id, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', [csrfH()]: csrf() },
            body: JSON.stringify(data)
        })
            .then(r => r.json())
            .then(res => {
                if (res.username) { closeModal(); showToast('User updated!', 'success'); loadUsers(); }
                else { showErrors(res, 'ee-'); }
            })
            .catch(() => showToast('Connection error', 'error'));
    }

    function deleteUser(id, username) {
        if (!confirm('Delete user ' + username + '?')) return;
        fetch('/api/users/' + id, {
            method: 'DELETE',
            headers: { [csrfH()]: csrf() }
        })
            .then(r => {
                if (r.status === 204) { showToast('User deleted', 'success'); loadUsers(); }
                else showToast('Delete failed', 'error');
            })
            .catch(() => showToast('Connection error', 'error'));
    }

    loadUsers();
</script>
</body>
</html>
