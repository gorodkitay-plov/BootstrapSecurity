<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-sm { min-width: 70px; }
        .sidebar {
            height: 100vh;
            background-color: #fff;
            border-right: 1px solid #dee2e6;
        }
        .sidebar .nav-link {
            display: block;
            width: 100%;
            color: #000;
            padding: 12px 20px;
        }
        .sidebar .nav-link.active {
            background-color: #0d6efd;
            color: #fff;
        }
    </style>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3 d-flex justify-content-between">
    <span class="navbar-text text-white">
        <b sec:authentication="name"></b> with roles
        <span sec:authentication="authorities"></span>
    </span>
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="btn btn-link text-white">Logout</button>
    </form>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 sidebar p-0">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin}">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user}">User</a>
                </li>
            </ul>
        </div>

        <!-- CONTENT -->
        <div class="col-10 p-4">
            <h2>Admin Panel</h2>

            <ul class="nav nav-tabs mb-3">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin}">All Users</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/new}">Add New User</a>
                </li>
            </ul>

            <div class="card">
                <div class="card-header">All Users</div>
                <div class="card-body">
                    <div id="successMessage" class="alert alert-success d-none">
                        User updated successfully!
                    </div>

                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Surname</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users}" th:id="'user-row-' + ${user.id}">
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.surname}"></td>
                            <td th:text="${user.name}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>
                            <td>
                                <!-- ✅ ИСПРАВЛЕНО: убран лишний пробел, используем #strings.listJoin -->
                                <span th:text="${#strings.listJoin(user.roles.![name], ', ')}"></span>
                            </td>
                            <td>
                                <button class="btn btn-info btn-sm"
                                        data-bs-toggle="modal"
                                        data-bs-target="#editModal"
                                        th:attr="data-id=${user.id},
                                                 data-username=${user.username},
                                                 data-name=${user.name},
                                                 data-surname=${user.surname},
                                                 data-email=${user.email},
                                                 data-age=${user.age},
                                                 data-roles=${#strings.listJoin(user.roles.![name], ',')}">
                                    Edit
                                </button>
                            </td>
                            <td>
                                <button class="btn btn-danger btn-sm"
                                        data-bs-toggle="modal"
                                        data-bs-target="#deleteModal"
                                        th:attr="data-id=${user.id}, data-username=${user.username}">
                                    Delete
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="editForm">
                <div class="modal-header">
                    <h5 class="modal-title">Edit User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">

                    <input type="hidden" id="editId">

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input class="form-control" id="editUsername">
                        <div class="text-danger" id="error-username"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="editPassword"
                                   placeholder="Leave blank to keep current password">
                            <button type="button" class="btn btn-outline-secondary" id="togglePasswordBtn">👁</button>
                        </div>
                        <div class="text-danger" id="error-password"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input class="form-control" id="editName">
                        <div class="text-danger" id="error-name"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Surname</label>
                        <input class="form-control" id="editSurname">
                        <div class="text-danger" id="error-surname"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control" id="editEmail">
                        <div class="text-danger" id="error-email"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input class="form-control" type="number" id="editAge">
                        <div class="text-danger" id="error-age"></div>
                    </div>

                    <div class="mb-3">
                        <h6>Roles</h6>
                        <div th:each="role : ${rolesList}">
                            <label>
                                <input type="checkbox" class="editRoleCheckbox" th:value="${role.name}">
                                <span th:text="${role.name}"></span>
                            </label><br/>
                        </div>
                        <div class="text-danger" id="error-roles"></div>
                    </div>

                    <!-- ✅ ИСПРАВЛЕНО: добавлен параметр имени CSRF для корректной отправки -->
                    <input type="hidden" id="csrfToken" th:value="${_csrf.token}"/>
                    <input type="hidden" id="csrfHeader" th:value="${_csrf.headerName}"/>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="deleteForm" method="post">
                <input type="hidden" name="_method" value="delete"/>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="modal-header">
                    <h5 class="modal-title">Delete User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to delete user <b id="deleteUsername"></b>?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-danger">Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ✅ ИСПРАВЛЕНО: togglePassword через addEventListener вместо inline onclick
    document.getElementById("togglePasswordBtn").addEventListener("click", function () {
        const input = document.getElementById("editPassword");
        if (input.type === "password") {
            input.type = "text";
            this.innerText = "🙈";
        } else {
            input.type = "password";
            this.innerText = "👁";
        }
    });

    document.getElementById('editModal').addEventListener('show.bs.modal', function (event) {
        const btn = event.relatedTarget;

        document.getElementById('editId').value        = btn.getAttribute('data-id');
        document.getElementById('editUsername').value  = btn.getAttribute('data-username');
        document.getElementById('editName').value      = btn.getAttribute('data-name');
        document.getElementById('editSurname').value   = btn.getAttribute('data-surname');
        document.getElementById('editEmail').value     = btn.getAttribute('data-email');
        document.getElementById('editAge').value       = btn.getAttribute('data-age');
        document.getElementById('editPassword').value  = "";
        document.getElementById('togglePasswordBtn').innerText = "👁";

        // ✅ ИСПРАВЛЕНО: используем класс вместо name для выборки чекбоксов
        const rolesArray = (btn.getAttribute("data-roles") || "")
            .split(",").map(r => r.trim()).filter(Boolean);

        document.querySelectorAll(".editRoleCheckbox").forEach(cb => {
            cb.checked = rolesArray.includes(cb.value.trim());
        });

        document.querySelectorAll("[id^='error-']").forEach(e => e.innerText = "");
        document.querySelectorAll(".is-invalid").forEach(i => i.classList.remove("is-invalid"));
    });

    document.getElementById("editForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const id = document.getElementById("editId").value;
        const passwordValue = document.getElementById("editPassword").value;

        const data = {
            username: document.getElementById("editUsername").value,
            name:     document.getElementById("editName").value,
            surname:  document.getElementById("editSurname").value,
            email:    document.getElementById("editEmail").value,
            age:      parseInt(document.getElementById("editAge").value),
            // ✅ ИСПРАВЛЕНО: используем класс вместо name
            roles:    Array.from(document.querySelectorAll(".editRoleCheckbox:checked")).map(cb => cb.value)
        };

        if (passwordValue && passwordValue.trim() !== "") {
            data.password = passwordValue;
        }

        document.querySelectorAll("[id^='error-']").forEach(el => el.innerText = "");
        document.querySelectorAll(".is-invalid").forEach(el => el.classList.remove("is-invalid"));

        // ✅ ИСПРАВЛЕНО: используем динамическое имя CSRF-заголовка
        const csrfHeader = document.getElementById("csrfHeader").value;
        const csrfToken  = document.getElementById("csrfToken").value;

        fetch("/admin/" + id + "/ajax", {
            method: "PATCH",
            headers: {
                "Content-Type": "application/json",
                [csrfHeader]: csrfToken
            },
            body: JSON.stringify(data)
        })
            .then(r => r.json())
            .then(res => {
                if (res.status === "error") {
                    for (const field in res.errors) {
                        const errorEl = document.getElementById("error-" + field);
                        const inputId = "edit" + field.charAt(0).toUpperCase() + field.slice(1);
                        const input   = document.getElementById(inputId);
                        if (errorEl) errorEl.innerText = res.errors[field];
                        if (input)   input.classList.add("is-invalid");
                    }
                } else {
                    const row = document.getElementById("user-row-" + id);
                    if (row) {
                        row.children[1].innerText = data.username;
                        row.children[2].innerText = data.surname;
                        row.children[3].innerText = data.name;
                        row.children[4].innerText = data.age;
                        row.children[5].innerText = data.email;
                        // ✅ ИСПРАВЛЕНО: отображаем роли с запятой для единообразия
                        row.children[6].innerText = data.roles.join(", ");
                    }
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                    const success = document.getElementById("successMessage");
                    success.classList.remove("d-none");
                    setTimeout(() => success.classList.add("d-none"), 3000);
                }
            })
            .catch(() => alert("Ошибка соединения с сервером"));
    });

    document.getElementById('deleteModal').addEventListener('show.bs.modal', function (event) {
        const btn = event.relatedTarget;
        document.getElementById('deleteUsername').innerText = btn.getAttribute('data-username');
        document.getElementById('deleteForm').setAttribute('action', '/admin/' + btn.getAttribute('data-id'));
    });
</script>

</body>
</html>
