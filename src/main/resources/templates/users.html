<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3 d-flex justify-content-between">
    <span class="navbar-text text-white">
        <b th:text="${#authentication.name}"></b> with roles
        <span th:each="r : ${#authentication.authorities}" th:text="|[${r.authority}]|"></span>
    </span>
    <form th:action="@{/logout}" method="post" class="m-0">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="btn btn-link text-white p-0">Logout</button>
    </form>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 bg-white border-end vh-100 pt-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active bg-primary text-white" th:href="@{/admin}">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user}">User</a>
                </li>
            </ul>
        </div>

        <!-- CONTENT -->
        <div class="col-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>Admin Panel</h2>
                <a class="btn btn-success" th:href="@{/admin/new}">Add New User</a>
            </div>

            <div class="card">
                <div class="card-header">All Users</div>
                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Roles</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.name}"></td>
                            <td th:text="${user.email}"></td>
                            <td>
                                <span th:each="role : ${user.roles}" th:text="${role.name} + ' '"></span>
                            </td>
                            <td>
                                <!-- EDIT BUTTON -->
                                <button class="btn btn-info btn-sm"
                                        data-bs-toggle="modal"
                                        data-bs-target="#editModal"
                                        th:attr="data-id=${user.id},
                                                 data-username=${user.username},
                                                 data-name=${user.name},
                                                 data-surname=${user.surname},
                                                 data-email=${user.email},
                                                 data-age=${user.age},
                                                 data-roles=${#strings.listJoin(user.roles.![name], ',')}">
                                    Edit
                                </button>

                                <!-- DELETE BUTTON -->
                                <button class="btn btn-danger btn-sm"
                                        data-bs-toggle="modal"
                                        data-bs-target="#deleteModal"
                                        th:attr="data-id=${user.id}, data-username=${user.username}">
                                    Delete
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="modal fade" id="editModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="editForm">
                <div class="modal-header">
                    <h5>Edit User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">

                    <input type="hidden" id="editId">

                    <label class="form-label fw-bold">Username</label>
                    <input class="form-control mb-2" id="editUsername" placeholder="Username">
                    <div class="text-danger" id="error-username"></div>

                    <label class="form-label fw-bold">Name</label>
                    <input class="form-control mb-2" id="editName" placeholder="Name">
                    <div class="text-danger" id="error-name"></div>

                    <label class="form-label fw-bold">Surname</label>
                    <input class="form-control mb-2" id="editSurname" placeholder="Surname">
                    <div class="text-danger" id="error-surname"></div>

                    <label class="form-label fw-bold">Email</label>
                    <input class="form-control mb-2" id="editEmail" placeholder="Email">
                    <div class="text-danger" id="error-email"></div>

                    <label class="form-label fw-bold">Age</label>
                    <input class="form-control mb-2" id="editAge" type="number" placeholder="Age">
                    <div class="text-danger" id="error-age"></div>

                    <h6>Roles</h6>
                    <div th:each="role : ${rolesList}">
                        <label class="form-check-label">
                            <input type="checkbox" name="rolesSelected" th:value="${role.name}" class="form-check-input">
                            <span th:text="${role.name}"></span>
                        </label><br/>
                    </div>
                    <div class="text-danger" id="error-roles"></div>
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Delete User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete user <b id="deleteUsername"></b>?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <form id="deleteForm" method="post">
                    <input type="hidden" name="_method" value="delete"/>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn btn-danger" type="submit">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // EDIT MODAL
    const editModal = document.getElementById('editModal');
    editModal.addEventListener('show.bs.modal', function(event) {
        const button = event.relatedTarget;
        document.getElementById('editId').value = button.getAttribute('data-id');
        document.getElementById('editUsername').value = button.getAttribute('data-username');
        document.getElementById('editName').value = button.getAttribute('data-name');
        document.getElementById('editSurname').value = button.getAttribute('data-surname');
        document.getElementById('editEmail').value = button.getAttribute('data-email');
        document.getElementById('editAge').value = button.getAttribute('data-age');

        // Сбрасываем роли
        document.querySelectorAll("input[name='rolesSelected']").forEach(cb => cb.checked = false);
        const roles = button.getAttribute("data-roles");
        if (roles) {
            roles.split(",").forEach(role => {
                document.querySelectorAll("input[name='rolesSelected']").forEach(cb => {
                    if (cb.value === role.trim()) cb.checked = true;
                });
            });
        }

        // Сбрасываем ошибки
        document.querySelectorAll("[id^='error-']").forEach(el => el.innerText = "");
    });

    // AJAX-сохранение
    document.getElementById("editForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const id = document.getElementById("editId").value;
        const formData = {
            username: document.getElementById("editUsername").value,
            name: document.getElementById("editName").value,
            surname: document.getElementById("editSurname").value,
            email: document.getElementById("editEmail").value,
            age: document.getElementById("editAge").value
        };
        const roles = Array.from(document.querySelectorAll("input[name='rolesSelected']:checked"))
            .map(cb => cb.value);
        document.querySelectorAll("[id^='error-']").forEach(el => el.innerText = "");
        fetch("/admin/" + id + "/ajax", {
            method: "PATCH",
            headers: {
                "Content-Type": "application/json",
                "X-CSRF-TOKEN": document.querySelector("input[name='_csrf']").value
            },
            body: JSON.stringify({ ...formData, rolesSelected: roles })
        })
            .then(res => res.json())
            .then(data => {
                if (data.status === "error") {
                    for (let field in data.errors) {
                        const el = document.getElementById("error-" + field);
                        if (el) el.innerText = data.errors[field];
                    }
                } else {
                    location.reload();
                }
            });
    });

    // DELETE MODAL
    const deleteModal = document.getElementById('deleteModal');
    deleteModal.addEventListener('show.bs.modal', function(event) {
        const button = event.relatedTarget;
        const userId = button.getAttribute('data-id');
        const username = button.getAttribute('data-username');
        document.getElementById('deleteUsername').innerText = username;
        document.getElementById('deleteForm').setAttribute('action', '/admin/' + userId);
    });
</script>

</body>
</html>
